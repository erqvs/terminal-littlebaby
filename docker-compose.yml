services:
  frontend:
    build: ./frontend
    container_name: terminal-claw-frontend
    restart: unless-stopped
    networks:
      - proxy-network

  backend:
    build: ./backend
    container_name: terminal-claw-backend
    restart: unless-stopped
    ports:
      - "3000:3000"  # 暴露端口供 OpenClaw 访问
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
    networks:
      - proxy-network
    depends_on: []

networks:
  proxy-network:
    external: true
